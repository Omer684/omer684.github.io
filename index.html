<style>
:root {
  --bg:#03030a;--bg2:#08080f;--surface:#0d0d18;--surface2:#111120;
  --border:rgba(255,255,255,0.06);--border-md:rgba(255,255,255,0.10);--border-hi:rgba(255,255,255,0.16);
  --text:#eeeef5;--muted:#6b6b88;--muted2:#9898b5;
  --lime:#d4ff1e;--lime-dim:rgba(212,255,30,0.08);--lime-glow:rgba(212,255,30,0.22);
  --violet:#6025d4;--violet2:#8b5cf6;--violet3:#c4b5fd;
  --cyan:#22d3ee;--emerald:#10b981;--rose:#f43f5e;--amber:#f59e0b;
  --teal:#14b8a6;--teal-dim:rgba(20,184,166,0.08);
  --font-display:'Syne',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'Space Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow-x:hidden;cursor:none;-webkit-font-smoothing:antialiased;}
#cur{position:fixed;width:9px;height:9px;background:var(--lime);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .2s,height .2s;}
#cur-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(212,255,30,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s;}
body.cur-hover #cur{width:20px;height:20px;opacity:.45;}
body.cur-hover #cur-ring{width:56px;height:56px;border-color:var(--lime);}
#prog{position:fixed;top:0;left:0;height:1.5px;width:0;background:linear-gradient(90deg,var(--lime),var(--violet2));z-index:9000;}
#loader{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;transition:opacity .9s ease,visibility .9s;}
#loader.out{opacity:0;visibility:hidden;pointer-events:none;}
.ld-name{font-family:var(--font-display);font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-.04em;background:linear-gradient(135deg,#fff,var(--violet3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:ldPulse 1.5s ease-in-out infinite;}
@keyframes ldPulse{0%,100%{opacity:1}50%{opacity:.2}}
.ld-bar-wrap{width:200px;height:1px;background:var(--border-md);overflow:hidden;}
.ld-bar{height:100%;background:linear-gradient(90deg,var(--lime),var(--violet2));width:0;transition:width .05s linear;}
.ld-pct{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.2em;color:var(--muted);}
.ld-tagline{font-size:.78rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:22px 5vw;display:flex;align-items:center;justify-content:space-between;transition:padding .3s,background .4s,border-bottom .4s;}
nav.scrolled{background:rgba(3,3,10,.9);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-bottom:1px solid var(--border);padding:13px 5vw;}
.nav-logo{font-family:var(--font-display);font-weight:800;font-size:1.1rem;text-decoration:none;background:linear-gradient(135deg,#fff,var(--violet3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-center{display:flex;gap:32px;list-style:none;align-items:center;}
.nav-center a{font-size:.82rem;font-weight:500;color:var(--muted2);text-decoration:none;letter-spacing:.02em;transition:color .2s;position:relative;}
.nav-center a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--lime);transition:width .25s;}
.nav-center a:hover{color:var(--text);}
.nav-center a:hover::after{width:100%;}
.nav-right{display:flex;gap:10px;align-items:center;}
.btn-resume-nav{display:inline-flex;align-items:center;gap:6px;background:rgba(212,255,30,.07);border:1px solid rgba(212,255,30,.25);color:var(--lime);font-family:var(--font-body);font-size:.78rem;font-weight:600;padding:8px 16px;border-radius:6px;text-decoration:none;letter-spacing:.04em;transition:background .2s,border-color .2s,transform .2s;backdrop-filter:blur(10px);}
.btn-resume-nav:hover{background:rgba(212,255,30,.14);border-color:var(--lime);transform:translateY(-1px);}
.nav-hire{background:linear-gradient(135deg,var(--violet),var(--violet2));color:#fff;font-family:var(--font-body);font-size:.82rem;font-weight:700;padding:9px 20px;border-radius:6px;text-decoration:none;letter-spacing:.03em;box-shadow:0 0 20px rgba(96,37,212,.3);transition:box-shadow .3s,transform .2s;}
.nav-hire:hover{box-shadow:0 0 36px rgba(96,37,212,.6);transform:translateY(-2px);}
#canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.5;}
section,.sw{position:relative;z-index:2;}
#hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:130px 5vw 80px;position:relative;overflow:hidden;}
.hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 70% 80% at 20% 50%,black 20%,transparent 100%);opacity:.7;}
.hero-orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;animation:orbF 12s ease-in-out infinite;}
.ho1{width:560px;height:560px;background:var(--violet);top:-180px;right:-100px;opacity:.08;}
.ho2{width:380px;height:380px;background:var(--cyan);bottom:-80px;left:-80px;opacity:.06;animation-delay:-6s;}
.ho3{width:250px;height:250px;background:var(--lime);top:42%;left:38%;opacity:.03;animation-delay:-9s;}
@keyframes orbF{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(35px,-45px) scale(1.07)}70%{transform:translate(-22px,28px) scale(.94)}}
.hero-kicker{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--lime);margin-bottom:20px;opacity:0;animation:slideUp .8s ease 2.1s forwards;}
.kicker-line{width:28px;height:1px;background:var(--lime);}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(96,37,212,.1);border:1px solid rgba(139,92,246,.22);border-radius:4px;padding:6px 14px;margin-bottom:28px;font-size:.74rem;font-weight:600;color:var(--violet3);letter-spacing:.05em;opacity:0;animation:slideUp .8s ease 2.2s forwards;}
.pulse-dot{width:6px;height:6px;background:var(--emerald);border-radius:50%;animation:pDot 2s ease-in-out infinite;}
@keyframes pDot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{opacity:.3;box-shadow:0 0 0 5px rgba(16,185,129,0)}}
.hero-h1{font-family:var(--font-display);font-size:clamp(2rem,5.8vw,5.8rem);font-weight:800;line-height:.92;letter-spacing:-.03em;opacity:0;animation:slideUp 1s ease 2.3s forwards;}
.h1-white{color:#fff;display:block;}
.h1-grad{display:block;background:linear-gradient(110deg,var(--lime) 0%,var(--violet3) 55%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradShift 6s ease-in-out infinite;}
@keyframes gradShift{0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(20deg)}}
.hero-role{margin-top:26px;font-size:clamp(.95rem,2vw,1.25rem);color:var(--muted);font-weight:300;min-height:1.8em;opacity:0;animation:slideUp .8s ease 2.5s forwards;}
.typed-txt{color:var(--text);font-weight:500;}
.blink{color:var(--lime);animation:blinkAnim 1s step-end infinite;}
@keyframes blinkAnim{0%,100%{opacity:1}50%{opacity:0}}
.hero-desc{max-width:500px;margin-top:18px;font-size:.95rem;color:var(--muted2);line-height:1.78;opacity:0;animation:slideUp .8s ease 2.7s forwards;}
.hero-desc strong{color:var(--text);font-weight:600;}
.hero-btns{margin-top:36px;display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:slideUp .8s ease 2.9s forwards;}
.btn-p{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--violet),var(--violet2));color:#fff;padding:14px 28px;border-radius:6px;font-family:var(--font-body);font-size:.88rem;font-weight:700;text-decoration:none;letter-spacing:.04em;box-shadow:0 0 28px rgba(96,37,212,.35);transition:box-shadow .3s,transform .2s;position:relative;overflow:hidden;}
.btn-p::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);opacity:0;transition:opacity .3s;}
.btn-p:hover{box-shadow:0 0 50px rgba(96,37,212,.65);transform:translateY(-2px);}
.btn-p:hover::before{opacity:1;}
.btn-s{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--text);padding:14px 28px;border-radius:6px;border:1px solid var(--border-md);font-family:var(--font-body);font-size:.88rem;font-weight:500;text-decoration:none;backdrop-filter:blur(10px);transition:border-color .25s,color .25s,transform .2s;}
.btn-s:hover{border-color:var(--lime);color:var(--lime);transform:translateY(-2px);}
.btn-dl{display:inline-flex;align-items:center;gap:8px;background:rgba(212,255,30,.06);border:1px solid rgba(212,255,30,.2);color:var(--lime);padding:14px 28px;border-radius:6px;font-family:var(--font-body);font-size:.88rem;font-weight:600;text-decoration:none;transition:background .2s,border-color .2s,transform .2s;}
.btn-dl:hover{background:rgba(212,255,30,.12);border-color:var(--lime);transform:translateY(-2px);}
.hero-stats{position:absolute;right:5vw;bottom:80px;display:flex;flex-direction:column;gap:28px;align-items:flex-end;opacity:0;animation:fadeIn 1s ease 3.2s forwards;}
.hs{text-align:right;}
.hs-num{font-family:var(--font-mono);font-size:2rem;font-weight:700;line-height:1;background:linear-gradient(135deg,var(--lime),var(--violet3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hs-lbl{font-size:.65rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:3px;}
.scroll-cue{position:absolute;bottom:28px;left:5vw;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeIn 1s ease 3.6s forwards;}
.sc-line{width:1px;height:48px;background:linear-gradient(180deg,var(--lime),transparent);animation:scPulse 2s ease-in-out infinite;}
@keyframes scPulse{0%,100%{opacity:.3}50%{opacity:1}}
.sc-txt{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.tech-strip{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:28px 0;overflow:hidden;position:relative;z-index:2;}
.ts-inner{display:flex;gap:48px;animation:tsScroll 26s linear infinite;width:max-content;}
@keyframes tsScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{display:flex;align-items:center;gap:8px;white-space:nowrap;}
.ti-icon{font-size:1rem;}
.ti-name{font-size:.78rem;font-weight:500;color:var(--muted);letter-spacing:.05em;}
.sw{padding:100px 5vw;max-width:1280px;margin:0 auto;}
.eyebrow{font-family:var(--font-mono);font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--lime);margin-bottom:14px;display:block;}
.sec-title{font-family:var(--font-display);font-size:clamp(2rem,4vw,3.6rem);font-weight:800;line-height:1.06;letter-spacing:-.025em;color:#fff;margin-bottom:16px;}
.sec-sub{font-size:.95rem;color:var(--muted2);max-width:500px;line-height:1.74;}
.divider{border:none;border-top:1px solid var(--border);}
.about-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:72px;align-items:start;margin-top:56px;}
.about-p{font-size:.95rem;color:var(--muted2);line-height:1.82;margin-bottom:18px;}
.about-p strong{color:var(--text);font-weight:600;}
.resume-card{margin-top:32px;background:linear-gradient(135deg,rgba(96,37,212,.1),rgba(139,92,246,.05));border:1px solid rgba(139,92,246,.2);border-radius:12px;padding:28px;}
.rc-title{font-family:var(--font-display);font-size:.9rem;font-weight:700;color:#fff;margin-bottom:6px;}
.rc-sub{font-size:.8rem;color:var(--muted);margin-bottom:18px;line-height:1.6;}
.rc-highlights{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;}
.rc-h{font-size:.78rem;color:var(--muted2);display:flex;align-items:center;gap:8px;}
.rc-h::before{content:'✓';color:var(--emerald);font-size:.7rem;font-weight:700;}
.rc-btns{display:flex;gap:10px;flex-wrap:wrap;}
.btn-rc-dl{display:inline-flex;align-items:center;gap:6px;background:var(--lime);color:#000;font-family:var(--font-body);font-size:.78rem;font-weight:700;padding:9px 18px;border-radius:5px;text-decoration:none;transition:transform .2s,box-shadow .2s;}
.btn-rc-dl:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--lime-glow);}
.btn-rc-vw{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border-md);color:var(--text);font-family:var(--font-body);font-size:.78rem;font-weight:500;padding:9px 18px;border-radius:5px;text-decoration:none;transition:border-color .2s;}
.btn-rc-vw:hover{border-color:var(--violet3);color:var(--violet3);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:36px;}
.sc{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:22px 18px;transition:border-color .3s,transform .3s,box-shadow .3s;}
.sc:hover{border-color:rgba(212,255,30,.25);transform:translateY(-3px);box-shadow:0 14px 36px rgba(0,0,0,.45);}
.sc-num{font-family:var(--font-mono);font-size:2rem;font-weight:700;line-height:1;background:linear-gradient(135deg,var(--lime),var(--violet3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sc-lbl{font-size:.72rem;color:var(--muted);margin-top:5px;letter-spacing:.06em;}
.tl{position:relative;padding-left:22px;margin-top:0;}
.tl::before{content:'';position:absolute;left:0;top:10px;bottom:0;width:1px;background:linear-gradient(180deg,var(--lime),transparent);}
.tl-item{position:relative;margin-bottom:32px;}
.tl-dot{position:absolute;left:-26px;top:7px;width:9px;height:9px;background:var(--lime);border-radius:50%;box-shadow:0 0 10px var(--lime-glow);}
.tl-date{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--lime);margin-bottom:4px;}
.tl-title{font-family:var(--font-display);font-size:.9rem;font-weight:700;color:#fff;margin-bottom:3px;}
.tl-sub{font-size:.8rem;color:var(--muted);line-height:1.6;}
.skills-cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:52px;}
.skill-cat{background:var(--surface);padding:32px;position:relative;overflow:hidden;transition:background .3s;}
.skill-cat::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 0% 0%,rgba(96,37,212,.12),transparent 65%);opacity:0;transition:opacity .4s;}
.skill-cat:hover{background:var(--surface2);}
.skill-cat:hover::before{opacity:1;}
.sk-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,rgba(96,37,212,.18),rgba(96,37,212,.04));border:1px solid rgba(96,37,212,.18);display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:16px;transition:transform .3s,box-shadow .3s;}
.skill-cat:hover .sk-icon{transform:scale(1.08);box-shadow:0 0 20px rgba(96,37,212,.28);}
.sk-title{font-family:var(--font-display);font-size:.95rem;font-weight:700;color:#fff;margin-bottom:8px;}
.sk-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.stag{font-size:.68rem;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted2);letter-spacing:.04em;}
/* ── PROJECT SECTION HEADERS ── */
.proj-section-header{display:flex;align-items:center;gap:16px;margin:56px 0 28px;}
.psh-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.psh-icon.analytics{background:linear-gradient(135deg,rgba(20,184,166,.2),rgba(20,184,166,.05));border:1px solid rgba(20,184,166,.25);}
.psh-icon.ml{background:linear-gradient(135deg,rgba(96,37,212,.2),rgba(96,37,212,.05));border:1px solid rgba(96,37,212,.25);}
.psh-label{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px;}
.psh-label.analytics{color:var(--teal);}
.psh-label.ml{color:var(--violet3);}
.psh-title{font-family:var(--font-display);font-size:1.3rem;font-weight:800;color:#fff;}
.psh-divider{flex:1;height:1px;}
.psh-divider.analytics{background:linear-gradient(90deg,rgba(20,184,166,.3),transparent);}
.psh-divider.ml{background:linear-gradient(90deg,rgba(139,92,246,.3),transparent);}
/* Analytics project cards */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.ac{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:relative;transition:border-color .3s,transform .3s,box-shadow .3s;}
.ac:hover{border-color:rgba(20,184,166,.35);transform:translateY(-5px);box-shadow:0 20px 55px rgba(0,0,0,.5),0 0 25px rgba(20,184,166,.08);}
.ac-header{padding:28px 28px 20px;background:linear-gradient(135deg,rgba(20,184,166,.06),rgba(20,184,166,.02));border-bottom:1px solid rgba(20,184,166,.1);position:relative;overflow:hidden;}
.ac-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 0% 0%,rgba(20,184,166,.12),transparent 65%);}
.ac-cat{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);margin-bottom:10px;display:block;position:relative;z-index:1;}
.ac-title{font-family:var(--font-display);font-size:1.15rem;font-weight:800;color:#fff;margin-bottom:8px;line-height:1.1;position:relative;z-index:1;}
.ac-tech{font-size:.72rem;color:var(--muted);font-style:italic;position:relative;z-index:1;}
.ac-body{padding:20px 28px 24px;}
.ac-desc{font-size:.84rem;color:var(--muted2);line-height:1.68;margin-bottom:14px;}
.ac-findings{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
.ac-finding{font-size:.8rem;color:var(--muted2);display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.ac-finding::before{content:'→';color:var(--teal);font-size:.72rem;flex-shrink:0;margin-top:2px;}
.ac-skills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.ac-tag{font-size:.65rem;padding:3px 9px;border-radius:4px;background:rgba(20,184,166,.07);border:1px solid  rgba(20,184,166,.18);color:var(--teal);}
.ac-links{display:flex;gap:8px;}
.btn-teal{display:inline-flex;align-items:center;gap:5px;background:rgba(20,184,166,.08);border:1px solid rgba(20,184,166,.22);color:var(--teal);padding:7px 14px;border-radius:5px;font-size:.75rem;font-weight:600;text-decoration:none;transition:background .2s,border-color .2s;}
.btn-teal:hover{background:rgba(20,184,166,.16);border-col
